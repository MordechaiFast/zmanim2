<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zmanim city search</title>
  
  <link rel="stylesheet" href="style.css" />
  <script src="keys.js"></script>
  <script src="api.js"></script>
  <script src="computations.js"></script>
  <script src="zman.js"></script>
</head>
<body>
  <main>
    <section id="form-section">
      <form id="input-form">
        <div class="form-group-row">
          <div class="form-group">
            <label for="city">City:</label>
            <input 
              type="text" 
              id="city" 
              name="city" 
              placeholder="Enter city name" 
              required
            >
          </div>
          <div class="form-group"></div>
          <button type="submit" class="btn-submit">Find city</button>
        </div>

        <div class="form-group">
          <label for="date">Date:</label>
          <input
            type="date"
            id="date"
            name="date"
            required
          >
        </div>
      </form>
      <div id="error" role="alert" aria-live="polite"></div>
    </section>

    <section id="results">
      <div id="results-card" class="results-card" aria-live="polite">
        <div class="card-left">
          <div class="city" id="card-city"></div>
          <span id="card-coords"></span>
          <strong>Davening Direction:</strong> <span id="card-direction"></span>
          <strong>Timezone:</strong> <span id="card-tz"></span>
          <strong>Date:</strong> <span id="card-date"></span>
          <span id="card-hebrew-date"></span>
        </div>

        <div class="card-right">
          <table class="daily-data" dir="rtl">
            <thead></thead>
            <tbody id="zmanim-body">
            </tbody>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
</html>
