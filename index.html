<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zmanim city search</title>
  
  <link rel="stylesheet" href="style.css" />
  <script src="keys.js"></script>
  <script src="api.js"></script>
  <script src="computations.js"></script>
  <script src="zman.js"></script>
</head>
<body>
  <h1>Sun Position Zmanim</h1>
  <main>
    <section id="form-section">
      Search by:
      <form id="input-form">
        <div class="form-group-row">
          <div class="form-group">
            <label for="city">City:</label>
            <input 
              type="text" 
              id="city" 
              name="city" 
              placeholder="Enter city name" 
              required
            >
          </div>
          <button type="submit" class="btn-submit">Find city</button>
        </div>
      </form>
      <form id="coords-form">
        <div class="form-group-row">
          <div class="form-group">
            <label for="lat">Latitude:</label>
            <input
              type="number"
              id="lat"
              name="lat"
              inputmode="decimal"
              min="-90"
              max="90"
              step="any"
              placeholder="e.g. 31.7780"
            >
            <label for="lat" class="unit-label">°N</label>
          </div>
          <div class="form-group">
            <label for="lon">Longitude:</label>
            <input
              type="number"
              id="lon"
              name="lon"
              inputmode="decimal"
              min="-180"
              max="180"
              step="any"
              placeholder="e.g. 35.2353"
            >
            <label for="lon" class="unit-label">°E</label>
          </div>
          <button type="submit" class="btn-submit">Find Location</button>
        </div>
      </form>
      <div id="error" role="alert" aria-live="polite"></div>
    </section>

    <section id="results" class="results-card" aria-live="polite">
        <div class="card-left">
          <div class="city" id="card-city"></div>
          <span id="card-coords"></span>
          <strong>Davening Direction:</strong> <span id="card-direction"></span>
          <div class="form-group">
            <label for="date"><strong>Date:</strong></label>
            <input
                type="date"
                id="date"
                name="date"
                required
            >
          </div>
          <span id="card-date"></span>
          <span id="card-hebrew-date"></span>
          <strong>Timezone:</strong> <span id="card-tz"></span>
        </div>

        <div class="card-right">
          <table class="daily-data" dir="rtl">
            <thead></thead>
            <tbody id="zmanim-body">
            </tbody>
          </table>
        </div>
    </section>
    
    <section id="settings">
      <div class="settings-card">
        <h2>Settings</h2>
        <div class="settings-grid">
          <fieldset class="settings-group">
            <legend>Temporal Hour Method</legend>
            <label class="choice-row">
              <input type="checkbox" id="setting-sun-position" checked>
              <span>זמנים by actual sun position</span>
            </label>
            <p class="settings-note">Not by fixed proportions of the day</p>
            <br>
            <label class="choice-row">
              <input type="radio" name="gra-mga" id="setting-gra" value="GRA" checked>
              <span>גר"א/לבוש Hours - Sunrise to Sunset</span>
            </label>
            <label class="choice-row">
              <input type="radio" name="gra-mga" id="setting-mga" value="MGA">
              <span>מג"א/רמב"ן Hours - Dawn to Dusk</span>
            </label>
            <label class="choice-row">
              <input type="radio" name="gra-mga" id="setting-mga" value="MGA2">
              <span>מג"א/רמב"ן זמניות - Dawn to Dusk with twilight as a portion of the daylight hours</span>
            </label>
          </fieldset>
    
          <fieldset class="settings-group">
            <legend>Twilight Angles</legend>
            <div class="form-group">
              <label for="setting-alot" class="twilight-label">עלות השחר</label>
              <select id="setting-alot">
                <option value="25.9">25.9° (120 min)</option>
                <option value="19.75">19.75° (90 min)</option>
                <option value="16.02" selected>16.02° (72 min)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="setting-misheyakir" class="twilight-label">משיכיר</label>
              <select id="setting-misheyakir">
                <option value="11.5">11.5° (50 min)</option>
                <option value="11">11° (48 min)</option>
                <option value="10.2" selected>10.2° (44 min)</option>
              </select>
            </div>
            <div class="form-group">  
              <label for="setting-tzeit" class="twilight-label">צאת הכוכבים</label>
              <select id="setting-tzeit">
                <option value="3.65">3.65° (13.5 min)</option>
                <option value="4.61" selected>4.61° (18 min)</option>
                <option value="5.88">5.88° (24 min)</option>
                <option value="6.45">6.45° (27 min)</option>
              </select>
            </div>
            <div class="form-group">  
              <label for="setting-shabbat" class="twilight-label">צאת שבת</label>
              <select id="setting-shabbat">
                <option value="8.5" selected>8.5° (36 min)</option>
                <option value="9.28">9.28° (40 min)</option>
                <option value="19.75">19.75° (90 min)</option>
                <option value="25.9">25.9° (120 min)</option>
              </select>
            </div>
          </fieldset>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
</html>
