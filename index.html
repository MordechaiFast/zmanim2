<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zmanim city search</title>
  
  <link rel="stylesheet" href="style.css" />
  <script src="keys.js"></script>
  <script src="api.js"></script>
  <script src="computations.js"></script>
  <script src="zman.js"></script>
</head>
<body>
  <h1>Sun Position Zmanim</h1>
  <main>
    <section id="form-section">
      Search by:
      <form id="input-form">
        <div class="form-group-row">
          <div class="form-group">
            <label for="city">City:</label>
            <input 
              type="text" 
              id="city" 
              name="city" 
              placeholder="Enter city name" 
              required
            >
          </div>
          <button type="submit" class="btn-submit">Find city</button>
        </div>
      </form>
      <form id="coords-form">
        <div class="form-group-row">
          <div class="form-group">
            <label for="lat">Latitude:</label>
            <input
              type="number"
              id="lat"
              name="lat"
              inputmode="decimal"
              min="-90"
              max="90"
              step="any"
              placeholder="e.g. 31.7780"
            >
          </div>
          <div class="form-group">
            <label for="lon">Longitude:</label>
            <input
              type="number"
              id="lon"
              name="lon"
              inputmode="decimal"
              min="-180"
              max="180"
              step="any"
              placeholder="e.g. 35.2353"
            >
          </div>
          <button type="submit" class="btn-submit">Find Location</button>
        </div>
      </form>
      <div id="error" role="alert" aria-live="polite"></div>
    </section>

    <section id="results">
      <div id="results-card" class="results-card" aria-live="polite">
        <div class="card-left">
          <div class="city" id="card-city"></div>
          <span id="card-coords"></span>
          <strong>Davening Direction:</strong> <span id="card-direction"></span>
          <div class="form-group">
            <label for="date"><strong>Date:</strong></label>
            <input
                type="date"
                id="date"
                name="date"
                required
            >
          </div>
          <span id="card-date"></span>
          <span id="card-hebrew-date"></span>
          <strong>Timezone:</strong> <span id="card-tz"></span>
        </div>

        <div class="card-right">
          <table class="daily-data" dir="rtl">
            <thead></thead>
            <tbody id="zmanim-body">
            </tbody>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
</html>
