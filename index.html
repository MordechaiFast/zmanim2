<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zmanim city search</title>
  
  <link rel="stylesheet" href="style.css" />
  <script src="keys.js"></script>
  <script src="api.js"></script>
  <script src="computations.js"></script>
  <script src="zman.js"></script>
</head>
<body>
  <main>
    <section id="form-section">
      <form id="input-form">
        <div class="input-modes" role="tablist" aria-label="Location input mode">
          <button type="button" class="mode-tab is-active" id="mode-city" data-mode="city" role="tab" aria-selected="true" aria-controls="city-pane">City name</button>
          <button type="button" class="mode-tab" id="mode-coords" data-mode="coords" role="tab" aria-selected="false" aria-controls="coords-pane">Coordinates</button>
        </div>

        <div class="input-panes">
          <section class="input-pane is-active" id="city-pane" data-mode="city" role="tabpanel" aria-labelledby="mode-city">
            <div class="form-group">
              <label for="city">City:</label>
              <input
                type="text"
                id="city"
                name="city"
                placeholder="Enter city name"
              >
            </div>
            <p id="city-mode-result" class="mode-result">Coordinates for the selected city will appear on the right.</p>
          </section>

          <section class="input-pane" id="coords-pane" data-mode="coords" role="tabpanel" aria-labelledby="mode-coords" aria-hidden="true">
            <div class="form-group form-group-coords">
              <label for="lat">Latitude:</label>
              <input
                type="number"
                id="lat"
                name="lat"
                inputmode="decimal"
                min="-90"
                max="90"
                step="any"
                placeholder="e.g. 31.7780"
              >
            </div>
            <div class="form-group form-group-coords">
              <label for="lon">Longitude:</label>
              <input
                type="number"
                id="lon"
                name="lon"
                inputmode="decimal"
                min="-180"
                max="180"
                step="any"
                placeholder="e.g. 35.2353"
              >
            </div>
            <p id="coords-mode-result" class="mode-result">City lookup by coordinates can be added here with your API call.</p>
          </section>
        </div>

        <div class="form-footer-row">
          <div class="form-group">
            <label for="date">Date:</label>
            <input
              type="date"
              id="date"
              name="date"
              required
            >
          </div>
          <button type="submit" class="btn-submit" id="find-btn">Find city</button>
        </div>
      </form>
      <div id="error" role="alert" aria-live="polite"></div>
    </section>

    <section id="results">
      <div id="results-card" class="results-card" aria-live="polite">
        <div class="card-left">
          <div class="city" id="card-city"></div>
          <span id="card-coords"></span>
          <strong>Davening Direction:</strong> <span id="card-direction"></span>
          <strong>Timezone:</strong> <span id="card-tz"></span>
          <strong>Date:</strong> <span id="card-date"></span>
          <span id="card-hebrew-date"></span>
        </div>

        <div class="card-right">
          <table class="daily-data" dir="rtl">
            <thead></thead>
            <tbody id="zmanim-body">
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
</html>
